name: Worker (registry import)

on:
  schedule:
    # Full catalog sync over the source API. This can be long because it walks the
    # whole source catalog and deactivates scraper rows missing from that full scan.
    - cron: "7 */6 * * *"
  workflow_dispatch:
    inputs:
      force_all:
        description: Run import_registry regardless of interval state
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: player-count-scraper-registry
  cancel-in-progress: false

jobs:
  run-registry:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    env:
      APP_NAME: Steam Player Count Scraper
      ENVIRONMENT: production
      DEBUG: "false"
      DATABASE_ECHO: "false"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SOURCE_API_BASE_URL: ${{ vars.SOURCE_API_BASE_URL }}
      SOURCE_API_TOKEN: ${{ secrets.SOURCE_API_TOKEN }}
      MIRROR_DATABASE_URL: ${{ secrets.MIRROR_DATABASE_URL }}
      MIRROR_DATABASE_USE_SSL: ${{ vars.MIRROR_DATABASE_USE_SSL || 'false' }}
      REQUIRE_MIRROR_SUCCESS: "true"
      HTTP_TIMEOUT_SECONDS: ${{ vars.HTTP_TIMEOUT_SECONDS || '45' }}
      SOURCE_API_PAGE_SIZE: ${{ vars.SOURCE_API_PAGE_SIZE || '250' }}
      REGISTRY_IMPORT_MINUTES: ${{ vars.REGISTRY_IMPORT_MINUTES || '360' }}
      WORKER_CYCLE_MAX_SECONDS: "19800"
      WORKER_CYCLE_SHUTDOWN_GRACE_SECONDS: "180"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate required settings
        run: |
          test -n "$DATABASE_URL" || { echo "DATABASE_URL secret is required"; exit 1; }
          test -n "$SOURCE_API_BASE_URL" || { echo "SOURCE_API_BASE_URL repo variable is required"; exit 1; }

      - name: Run registry import pipeline
        run: |
          ARGS="--pipeline registry"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_all }}" = "true" ]; then
            ARGS="$ARGS --force-all"
          fi
          bash ./scripts/with_asyncpg_env.sh python -m app.run_scheduled_jobs $ARGS
