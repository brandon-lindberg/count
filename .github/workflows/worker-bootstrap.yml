name: Worker (bootstrap backfill)

on:
  schedule:
    # Long first-success backfill lane. Keep this less frequent than the expected
    # runtime so scheduled runs do not pile up behind each other.
    - cron: "2 */6 * * *"
  workflow_dispatch:
    inputs:
      force_all:
        description: Run bootstrap_poll regardless of interval state
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: player-count-scraper-bootstrap
  cancel-in-progress: false

jobs:
  run-bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    env:
      APP_NAME: Steam Player Count Scraper
      ENVIRONMENT: production
      DEBUG: "false"
      DATABASE_ECHO: "false"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SOURCE_API_BASE_URL: ${{ vars.SOURCE_API_BASE_URL }}
      SOURCE_API_TOKEN: ${{ secrets.SOURCE_API_TOKEN }}
      MIRROR_DATABASE_URL: ${{ secrets.MIRROR_DATABASE_URL }}
      MIRROR_DATABASE_USE_SSL: ${{ vars.MIRROR_DATABASE_USE_SSL || 'false' }}
      REQUIRE_MIRROR_SUCCESS: "true"
      HTTP_TIMEOUT_SECONDS: ${{ vars.HTTP_TIMEOUT_SECONDS || '45' }}
      BOOTSTRAP_POLL_MINUTES: "5"
      BOOTSTRAP_BATCH_LIMIT: ${{ vars.BOOTSTRAP_BATCH_LIMIT || '2500' }}
      WORKER_CYCLE_MAX_SECONDS: "19800"
      WORKER_CYCLE_SHUTDOWN_GRACE_SECONDS: "180"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate required settings
        run: |
          test -n "$DATABASE_URL" || { echo "DATABASE_URL secret is required"; exit 1; }
          test -n "$SOURCE_API_BASE_URL" || { echo "SOURCE_API_BASE_URL repo variable is required"; exit 1; }
          test -n "$MIRROR_DATABASE_URL" || { echo "MIRROR_DATABASE_URL secret is required to mirror updates into backend DB"; exit 1; }

      - name: Run bootstrap backfill pipeline
        run: |
          ARGS="--pipeline bootstrap"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_all }}" = "true" ]; then
            ARGS="$ARGS --force-all"
          fi
          bash ./scripts/with_asyncpg_env.sh python -m app.run_scheduled_jobs $ARGS
