name: Worker

on:
  schedule:
    - cron: "3,33 * * * *"
  workflow_dispatch:
    inputs:
      force_all:
        description: Run every scheduled job regardless of interval state
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: player-count-scraper-worker
  cancel-in-progress: false

jobs:
  run-worker-cycle:
    runs-on: ubuntu-latest
    # GitHub-hosted jobs can run up to 6h; this caps our run earlier so a bad cycle fails fast.
    # Poll budget (worst case, all jobs run): 2*BOOTSTRAP_BATCH_LIMIT + POLL_BATCH_LIMIT (hot) + POLL_BATCH_LIMIT (warm) [+ cold if enabled].
    # Example: 2*100+100+100=400 polls × ~5s ≈ 33 min, plus checkout/pip/registry — keep total under this timeout.
    timeout-minutes: 60
    env:
      APP_NAME: Steam Player Count Scraper
      ENVIRONMENT: production
      DEBUG: "false"
      DATABASE_ECHO: "false"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SOURCE_API_BASE_URL: ${{ vars.SOURCE_API_BASE_URL }}
      SOURCE_API_TOKEN: ${{ secrets.SOURCE_API_TOKEN }}
      MIRROR_DATABASE_URL: ${{ secrets.MIRROR_DATABASE_URL }}
      MIRROR_DATABASE_USE_SSL: ${{ vars.MIRROR_DATABASE_USE_SSL || 'false' }}
      REQUIRE_MIRROR_SUCCESS: "true"
      HTTP_TIMEOUT_SECONDS: ${{ vars.HTTP_TIMEOUT_SECONDS || '45' }}
      SOURCE_API_PAGE_SIZE: ${{ vars.SOURCE_API_PAGE_SIZE || '50' }}
      HOT_POLL_MINUTES: "30"
      WARM_POLL_MINUTES: "60"
      COLD_POLL_MINUTES: "180"
      ENABLE_COLD_POLLING: "false"
      # Smaller batches = more half-hourly cycles to drain the queue, but avoids job timeout.
      # Warm ~2k apps: full rotation takes many runs regardless; hot ~100 fits easily in one batch.
      POLL_BATCH_LIMIT: "100"
      BOOTSTRAP_BATCH_LIMIT: "100"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate required settings
        run: |
          test -n "$DATABASE_URL" || { echo "DATABASE_URL secret is required"; exit 1; }
          test -n "$SOURCE_API_BASE_URL" || { echo "SOURCE_API_BASE_URL repo variable is required"; exit 1; }
          test -n "$MIRROR_DATABASE_URL" || { echo "MIRROR_DATABASE_URL secret is required to mirror updates into backend DB"; exit 1; }

      - name: Run worker cycle
        run: |
          ARGS=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_all }}" = "true" ]; then
            ARGS="--force-all"
          fi
          bash ./scripts/with_asyncpg_env.sh python -m app.run_scheduled_jobs $ARGS
