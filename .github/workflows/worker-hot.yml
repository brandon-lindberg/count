name: Worker (HOT players)

# Cron is UTC. This workflow is intentionally isolated from maintenance/bootstrap
# so time-sensitive HOT polling is not queued behind long backfill work.
on:
  schedule:
    - cron: "10,25,40,55 * * * *"
  workflow_dispatch:
    inputs:
      force_all:
        description: Run poll_hot regardless of interval state
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: player-count-scraper-hot
  cancel-in-progress: false

jobs:
  run-hot:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      APP_NAME: Steam Player Count Scraper
      ENVIRONMENT: production
      DEBUG: "false"
      DATABASE_ECHO: "false"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SOURCE_API_BASE_URL: ${{ vars.SOURCE_API_BASE_URL }}
      SOURCE_API_TOKEN: ${{ secrets.SOURCE_API_TOKEN }}
      MIRROR_DATABASE_URL: ${{ secrets.MIRROR_DATABASE_URL }}
      MIRROR_DATABASE_USE_SSL: ${{ vars.MIRROR_DATABASE_USE_SSL || 'false' }}
      REQUIRE_MIRROR_SUCCESS: "true"
      HTTP_TIMEOUT_SECONDS: ${{ vars.HTTP_TIMEOUT_SECONDS || '45' }}
      HOT_POLL_MINUTES: ${{ vars.HOT_POLL_MINUTES || '30' }}
      HOT_POLL_BATCH_LIMIT: ${{ vars.HOT_POLL_BATCH_LIMIT || '300' }}
      WORKER_CYCLE_MAX_SECONDS: "1200"
      WORKER_CYCLE_SHUTDOWN_GRACE_SECONDS: "60"
    steps:
      - name: Trigger metadata (schedule vs manual)
        run: |
          echo "github.event_name=${{ github.event_name }}"
          echo "github.event.schedule=${{ github.event.schedule }}"

      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate required settings
        run: |
          test -n "$DATABASE_URL" || { echo "DATABASE_URL secret is required"; exit 1; }
          test -n "$SOURCE_API_BASE_URL" || { echo "SOURCE_API_BASE_URL repo variable is required"; exit 1; }
          test -n "$MIRROR_DATABASE_URL" || { echo "MIRROR_DATABASE_URL secret is required to mirror updates into backend DB"; exit 1; }

      - name: Run HOT player pipeline
        run: |
          ARGS="--pipeline hot"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_all }}" = "true" ]; then
            ARGS="$ARGS --force-all"
          fi
          bash ./scripts/with_asyncpg_env.sh python -m app.run_scheduled_jobs $ARGS
